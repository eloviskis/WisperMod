# WisperMod — acesso via IP direto
# Coloca em /etc/nginx/sites-available/wispermod e habilita com:
#   ln -s /etc/nginx/sites-available/wispermod /etc/nginx/sites-enabled/wispermod

server {
    listen 80;
    server_name 77.37.41.105 srv1259700.hstgr.cloud;

    # Limites para uploads de áudio grandes
    client_max_body_size 600M;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    root /var/www;

    # Redireciona /wispermod → /wispermod/
    location = /wispermod {
        return 301 /wispermod/;
    }

    # Frontend — arquivos estáticos (root /var/www → /var/www/wispermod/...)
    location /wispermod/ {
        try_files $uri $uri/ /wispermod/index.html;
        add_header Cache-Control 'no-cache, must-revalidate';
    }

    # API REST — proxy para backend Python (porta 8001), remove prefixo /wispermod/api
    location /wispermod/api/ {
        proxy_pass http://127.0.0.1:8001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        client_max_body_size 600M;
    }

    # WebSocket — proxy para backend Python (porta 8001)
    location /wispermod/ws/ {
        proxy_pass http://127.0.0.1:8001/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }
}
